scene:
  width_m: 3000
  height_m: 3000
  max_elevation_m: 100
  resolution_m: 1
  origin_x_m: 0
  origin_y_m: 3000
  crs: EPSG:3857
  seed: 42

terrain:
  base_type: ridge
  add_perlin_noise: false
  noise_scale: 0.01
  noise_amplitude: 5.0
  noise_octaves: 4
  add_gaussian_hills: true
  hill_count: 2
  hill_sigma_min: 0.15
  hill_sigma_max: 0.30
  valley_ratio: 0.25
  smooth_sigma: 15.0
  clip_min: 0
  clip_max: 100
  max_buildable_slope_deg: 24.0
  max_buildable_roughness_m: 10.0
  roughness_window: 5

users:
  count: 50
  min_spacing_m: 30
  distribution_mode: clustered
  cluster_count: 5
  cluster_radius_m: 200
  load_kw_range: [2.0, 25.0]
  importance_range: [1, 3]

obstacles:
  forest_count: 8
  water_count: 3
  manual_no_build_count: 2
  min_area_m2: 2000
  max_area_m2: 80000
  buffer_from_users_m: 20

planning:
  transformer_candidate_step_m: 100
  pole_candidate_step_m: 50
  forbidden_cost: 1000000.0
  slope_weight: 2.5
  roughness_weight: 1.5

outputs:
  create_plots: true

visualization:
  terrain_3d_max_grid_size: 200
  terrain_3d_vertical_exaggeration: 3.0
  terrain_3d_camera_elev_deg: 40
  terrain_3d_camera_azim_deg: -60
